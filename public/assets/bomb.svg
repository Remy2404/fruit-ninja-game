<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110">
  <defs>
    <radialGradient id="bombGrad" cx="35%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#555555"/>
      <stop offset="40%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="bombShine" cx="30%" cy="25%" r="20%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sparkGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffdd00"/>
      <stop offset="40%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#ff3300" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Body -->
  <circle cx="50" cy="65" r="38" fill="url(#bombGrad)"/>
  <circle cx="50" cy="65" r="38" fill="url(#bombShine)"/>
  <!-- Cap -->
  <rect x="42" y="24" width="16" height="10" rx="3" fill="#444"/>
  <rect x="44" y="26" width="12" height="6" rx="2" fill="#555"/>
  <!-- Fuse -->
  <path d="M50 24 Q55 12 62 8 Q68 5 72 8" fill="none" stroke="#c4a46c" stroke-width="3" stroke-linecap="round"/>
  <!-- Spark glow -->
  <circle cx="72" cy="8" r="10" fill="url(#sparkGlow)" opacity="0.8"/>
  <!-- Spark core -->
  <circle cx="72" cy="8" r="3" fill="#ffee44"/>
  <!-- Spark rays -->
  <line x1="72" y1="0" x2="72" y2="-4" stroke="#ffaa00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="78" y1="8" x2="82" y2="8" stroke="#ffaa00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="76" y1="3" x2="80" y2="0" stroke="#ffaa00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="76" y1="13" x2="80" y2="16" stroke="#ffaa00" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Cross emblem on bomb -->
  <line x1="42" y1="65" x2="58" y2="65" stroke="#333" stroke-width="2" opacity="0.4"/>
  <line x1="50" y1="57" x2="50" y2="73" stroke="#333" stroke-width="2" opacity="0.4"/>
</svg>
