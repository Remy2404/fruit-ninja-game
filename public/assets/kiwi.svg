<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="kw" cx="40%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#8dc63f"/>
      <stop offset="70%" stop-color="#5a8c1a"/>
      <stop offset="100%" stop-color="#2e5a0a"/>
    </radialGradient>
    <radialGradient id="kwFlesh" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8e6a0"/>
      <stop offset="50%" stop-color="#8dc63f"/>
      <stop offset="100%" stop-color="#5a8c1a"/>
    </radialGradient>
  </defs>
  <!-- Outer brown skin oval -->
  <ellipse cx="50" cy="52" rx="34" ry="42" fill="#7a5c30"/>
  <!-- Green flesh ring -->
  <ellipse cx="50" cy="52" rx="30" ry="38" fill="url(#kwFlesh)"/>
  <!-- White center / core -->
  <ellipse cx="50" cy="52" rx="8" ry="8" fill="#f5f5dc"/>
  <!-- Seeds radiating out -->
  <ellipse cx="50" cy="36" rx="2.5" ry="4" fill="#2e1a00" transform="rotate(0 50 52)"/>
  <ellipse cx="60" cy="38" rx="2.5" ry="4" fill="#2e1a00" transform="rotate(30 50 52)"/>
  <ellipse cx="67" cy="45" rx="2.5" ry="4" fill="#2e1a00" transform="rotate(60 50 52)"/>
  <ellipse cx="67" cy="59" rx="2.5" ry="4" fill="#2e1a00" transform="rotate(90 50 52)"/>
  <ellipse cx="60" cy="66" rx="2.5" ry="4" fill="#2e1a00" transform="rotate(120 50 52)"/>
  <ellipse cx="50" cy="68" rx="2.5" ry="4" fill="#2e1a00" transform="rotate(150 50 52)"/>
  <ellipse cx="40" cy="66" rx="2.5" ry="4" fill="#2e1a00" transform="rotate(180 50 52)"/>
  <ellipse cx="33" cy="59" rx="2.5" ry="4" fill="#2e1a00" transform="rotate(210 50 52)"/>
  <ellipse cx="33" cy="45" rx="2.5" ry="4" fill="#2e1a00" transform="rotate(240 50 52)"/>
  <ellipse cx="40" cy="38" rx="2.5" ry="4" fill="#2e1a00" transform="rotate(270 50 52)"/>
  <!-- Stem -->
  <line x1="50" y1="10" x2="50" y2="18" stroke="#5a3a1a" stroke-width="3" stroke-linecap="round"/>
</svg>
