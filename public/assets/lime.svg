<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="li" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#b5f060"/>
      <stop offset="60%" stop-color="#6dbf1a"/>
      <stop offset="100%" stop-color="#3a7a00"/>
    </radialGradient>
    <radialGradient id="liShine" cx="30%" cy="26%" r="28%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Oval body -->
  <ellipse cx="50" cy="52" rx="32" ry="38" fill="url(#li)"/>
  <!-- Nib ends -->
  <ellipse cx="50" cy="18" rx="6" ry="5" fill="#3a7a00"/>
  <ellipse cx="50" cy="86" rx="6" ry="5" fill="#3a7a00"/>
  <!-- Peel lines -->
  <line x1="50" y1="18" x2="50" y2="86" stroke="#4a9c10" stroke-width="1.5" opacity="0.4"/>
  <line x1="32" y1="22" x2="26" y2="80" stroke="#4a9c10" stroke-width="1.5" opacity="0.3"/>
  <line x1="68" y1="22" x2="74" y2="80" stroke="#4a9c10" stroke-width="1.5" opacity="0.3"/>
  <!-- Shine -->
  <ellipse cx="50" cy="52" rx="32" ry="38" fill="url(#liShine)"/>
</svg>
