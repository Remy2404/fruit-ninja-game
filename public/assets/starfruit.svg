<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="sf" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe08a"/>
      <stop offset="60%" stop-color="#f4a800"/>
      <stop offset="100%" stop-color="#c87800"/>
    </radialGradient>
    <radialGradient id="sfShine" cx="30%" cy="26%" r="26%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 5-pointed star shape -->
  <polygon points="50,6 62,36 94,36 70,56 80,88 50,70 20,88 30,56 6,36 38,36" fill="url(#sf)"/>
  <!-- Ridge lines along each arm -->
  <line x1="50" y1="6" x2="50" y2="70" stroke="#c87800" stroke-width="1.5" opacity="0.5"/>
  <line x1="62" y1="36" x2="20" y2="88" stroke="#c87800" stroke-width="1.5" opacity="0.4"/>
  <line x1="38" y1="36" x2="80" y2="88" stroke="#c87800" stroke-width="1.5" opacity="0.4"/>
  <!-- Shine -->
  <polygon points="50,6 62,36 94,36 70,56 80,88 50,70 20,88 30,56 6,36 38,36" fill="url(#sfShine)"/>
</svg>
